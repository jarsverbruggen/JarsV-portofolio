<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DE2F2"/>
      <stop offset="0.55" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- playful rounded tile, cyan brand -->
  <rect x="0" y="0" width="64" height="64" rx="15" fill="url(#bg)"/>
  <rect x="0" y="0" width="64" height="64" rx="15" fill="url(#sheen)"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="14.25" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- "F" monogram -->
  <g fill="#FFFFFF">
    <rect x="18" y="15" width="8" height="34" rx="2.5"/>
    <rect x="18" y="15" width="24" height="8" rx="2.5"/>
    <rect x="18" y="28" width="18" height="8" rx="2.5"/>
  </g>

  <!-- terminal cursor — accent red, a nod to the security/terminal theme -->
  <rect x="40" y="41" width="8" height="8" rx="2" fill="#FF4D4D"/>
</svg>
